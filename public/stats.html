<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DAMON Analytics</title>

<link rel="stylesheet" href="./styles/main.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="page">

<div class="top-bar">

<div>
<h1>Analytics Dashboard</h1>
<p class="subtitle">Performance analytics and statistics</p>
</div>

<div class="top-bar-actions">
<a class="card" href="profile.html">Profile</a>
<a class="card" href="settings.html">Settings</a>
<a class="card" href="home.html">Home</a>
</div>

</div>

<section class="card dashboard-hero-card">

<div class="dashboard-hero-layout">

<div id="statsAvatar" class="dashboard-hero-avatar">🦸</div>

<div>
<h2 id="statsUsername">Player</h2>
<p id="statsSummaryText">Stats summary</p>
</div>

</div>

</section>

<section class="dashboard-kpi-grid">

<div class="card dashboard-kpi-card">
<span>Total Points</span>
<h3 id="statsPoints">0</h3>
</div>

<div class="card dashboard-kpi-card">
<span>Total Wins</span>
<h3 id="statsWins">0</h3>
</div>

<div class="card dashboard-kpi-card">
<span>Total Losses</span>
<h3 id="statsLosses">0</h3>
</div>

<div class="card dashboard-kpi-card">
<span>Matches Played</span>
<h3 id="statsMatches">0</h3>
</div>

<div class="card dashboard-kpi-card">
<span>Win Rate</span>
<h3 id="statsWinRate">0%</h3>
</div>

<div class="card dashboard-kpi-card">
<span>Best Category</span>
<h3 id="statsBestCategory">-</h3>
</div>

</section>

<section class="grid-2">

<div class="card">

<h2>Category Distribution</h2>

<canvas id="categoryChart"></canvas>

</div>

<div class="card">

<h2>Game Mode Distribution</h2>

<canvas id="modeChart"></canvas>

</div>

</section>

<section class="card">

<h2>Recent Matches</h2>

<div id="recentMatches"></div>

</section>

</div>

<script src="./js/app-state.js"></script>
<script src="./js/global-ui.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/audio.js"></script>
<script src="./js/stats.js"></script>

</body>
</html>
