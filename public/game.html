<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAMON - Arena</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <div>
        <h1 style="margin:0;">Battle Arena</h1>
        <p class="subtitle" style="text-align:left; margin:6px 0 0;">Turn-based same-screen quiz battle</p>
      </div>
      <a class="card" href="./home.html">Exit Arena</a>
    </div>

    <div id="messageBox" class="message-box"></div>
    <div id="achievementPopupStack" class="achievement-popup-stack"></div>
    <div id="confettiContainer" class="confetti-container"></div>

    <section class="card">
      <div class="score-grid">
        <div class="score-card">
          <div class="hero-pill" id="p1Avatar">🦸</div>
          <h3 id="p1Name">Player 1</h3>
          <p>Score: <span id="p1Score">0</span></p>
          <p>Streak: <span id="p1StreakDisplay">0</span></p>
        </div>

        <div class="vs-text">VS</div>

        <div class="score-card">
          <div class="hero-pill" id="p2Avatar">🦹</div>
          <h3 id="p2Name">Player 2</h3>
          <p>Score: <span id="p2Score">0</span></p>
          <p>Streak: <span id="p2StreakDisplay">0</span></p>
        </div>
      </div>

      <h3 id="turnIndicator" style="text-align:center; margin-top:22px;">Turn:</h3>
      <p class="timer" id="timerText">Time Left: 10s</p>
      <p style="text-align:center;">Round: <span id="roundNumber">1</span> / 5</p>

      <div id="botPersonalityText" class="bot-personality-text hidden"></div>
      <div id="streakBanner" class="streak-banner hidden"></div>

      <div class="powerups-panel">
        <h3 style="margin:0 0 10px;">Powerups</h3>
        <div class="powerup-grid">
          <button id="powerup5050Btn" class="powerup-btn" type="button">50/50 <span id="powerup5050Count">1</span></button>
          <button id="powerupSkipBtn" class="powerup-btn" type="button">Skip <span id="powerupSkipCount">1</span></button>
          <button id="powerupTimeBtn" class="powerup-btn" type="button">+5 Time <span id="powerupTimeCount">1</span></button>
          <button id="powerupDoubleBtn" class="powerup-btn" type="button">Double Points <span id="powerupDoubleCount">1</span></button>
        </div>
      </div>

      <div class="question-box">
        <div id="questionText">Loading question...</div>
      </div>

      <div class="answers-grid">
        <button class="answer-btn" data-index="0" type="button">Option 1</button>
        <button class="answer-btn" data-index="1" type="button">Option 2</button>
        <button class="answer-btn" data-index="2" type="button">Option 3</button>
        <button class="answer-btn" data-index="3" type="button">Option 4</button>
      </div>
    </section>

    <section class="card hidden result-polish-card victory-card" id="resultCard">
      <div class="victory-glow"></div>
      <div class="result-badge" id="resultBadge">🏅</div>
      <h2>Battle Result</h2>
      <p id="winnerText"></p>
      <p id="finalScoreText"></p>
      <p id="resultMetaText" class="result-meta-text"></p>

      <div id="progressSummary" class="progress-summary"></div>

      <section class="result-section">
        <h3>Unlocked Achievements</h3>
        <div id="unlockedAchievements" class="result-achievement-list"></div>
      </section>

      <section class="result-section">
        <h3>Daily Challenge Progress</h3>
        <div id="dailyChallengeStatus" class="daily-result-list"></div>
      </section>

      <section class="result-section">
        <h3>Powerup Rewards</h3>
        <div id="powerupRewardsBox" class="reward-list"></div>
      </section>

      <div class="result-actions">
        <button id="sameCategoryRematchBtn" type="button">Rematch Same Category</button>
        <button id="newCategoryBtn" class="secondary" type="button">Choose New Category</button>
        <button id="historyBtn" class="secondary" type="button">View History</button>
      </div>
    </section>
  </div>

  <script src="./js/app-state.js"></script>
  <script src="./js/global-ui.js"></script>
  <script src="./js/theme.js"></script>
  <script src="./js/audio.js"></script>
  <script src="./js/game.js"></script>
</body>
</html>
