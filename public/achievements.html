<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAMON - Achievements</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <div>
        <h1 style="margin:0;">Achievements & Daily Challenges</h1>
        <p class="subtitle" style="text-align:left; margin:6px 0 0;">Track your milestones and today’s goals.</p>
      </div>
      <div class="top-bar-actions">
        <a class="card" href="./profile.html">Profile</a>
        <a class="card" href="./home.html">Back Home</a>
      </div>
    </div>

    <section class="card achievement-summary-card">
      <div class="achievement-summary-layout">
        <div class="achievement-summary-avatar" id="achievementAvatar">🦸</div>
        <div>
          <h2 id="achievementUsername" style="margin:0;">Player</h2>
          <p id="achievementSummaryText" style="margin:6px 0 0;">Summary loading...</p>
        </div>
      </div>
    </section>

    <section class="card" style="margin-bottom:20px;">
      <h2 style="margin-top:0;">Daily Challenges</h2>
      <div id="dailyChallengeGrid" class="daily-challenge-grid"></div>
    </section>

    <section class="card">
      <h2 style="margin-top:0;">Achievements</h2>
      <div id="achievementGrid" class="achievement-grid"></div>
    </section>
  </div>

  <script src="./js/app-state.js"></script>
  <script src="./js/global-ui.js"></script>
  <script src="./js/theme.js"></script>
  <script src="./js/audio.js"></script>
  <script src="./js/achievements.js"></script>
</body>
</html>
