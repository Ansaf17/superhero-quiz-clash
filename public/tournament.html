<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAMON - Tournament</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <div>
        <h1 style="margin:0;">Tournament Bracket</h1>
        <p class="subtitle" style="text-align:left; margin:6px 0 0;">Win the semi-final, then conquer the final.</p>
      </div>
      <div class="top-bar-actions">
        <a class="card" href="./home.html">Back Home</a>
      </div>
    </div>

    <div id="messageBox" class="message-box"></div>

    <section class="card" style="margin-bottom:20px;">
      <h2 style="margin-top:0;">Tournament Setup</h2>

      <div class="grid-2">
        <div>
          <label for="tournamentCategory">Category</label>
          <select id="tournamentCategory">
            <option value="math">Maths</option>
            <option value="banana">Banana API</option>
            <option value="general">General Knowledge</option>
            <option value="programming">Programming</option>
          </select>
        </div>

        <div>
          <label for="tournamentDifficulty">Difficulty</label>
          <select id="tournamentDifficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
      </div>

      <div class="settings-actions">
        <button id="startTournamentBtn" type="button">Start New Tournament</button>
        <button id="continueTournamentBtn" class="secondary" type="button">Continue Tournament</button>
        <button id="resetTournamentBtn" class="secondary" type="button">Reset Tournament</button>
      </div>
    </section>

    <section class="card">
      <h2 style="margin-top:0;">Bracket</h2>
      <div id="tournamentBracket" class="tournament-bracket"></div>
    </section>
  </div>

  <script src="./js/app-state.js"></script>
  <script src="./js/global-ui.js"></script>
  <script src="./js/theme.js"></script>
  <script src="./js/audio.js"></script>
  <script src="./js/tournament.js"></script>
</body>
</html>
