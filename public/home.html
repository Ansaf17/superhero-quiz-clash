<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAMON</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>

  <div class="page">

    <div class="home-topbar">
      <div></div>

      <div class="profile-menu-wrapper">
        <button id="profileToggleBtn" class="profile-toggle-btn" type="button">
          <span id="profileToggleAvatar">👤</span>
        </button>

        <div id="profileDropdown" class="profile-dropdown profile-dropdown-hidden">
          <div id="loggedOutPanel">
            <h3 style="margin-top:0;">Account</h3>

            <label for="loginUsername">Username</label>
            <input id="loginUsername" type="text" placeholder="Enter username" />

            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" placeholder="Enter password" />

            <div class="compact-auth-actions">
              <button id="loginBtn" type="button">Login</button>
              <button id="showRegisterBtn" class="secondary" type="button">Register</button>
            </div>

            <div id="registerArea" class="hidden" style="margin-top:16px;">
              <label for="registerUsername">New Username</label>
              <input id="registerUsername" type="text" placeholder="Enter username" />

              <label for="registerPassword">New Password</label>
              <input id="registerPassword" type="password" placeholder="Enter password" />

              <h4>Choose Avatar</h4>
              <div class="avatar-grid compact-avatar-grid" id="avatarGrid">
                <div class="avatar-option" data-avatar="🦸">🦸</div>
                <div class="avatar-option" data-avatar="🦹">🦹</div>
                <div class="avatar-option" data-avatar="⚡">⚡</div>
                <div class="avatar-option" data-avatar="🔥">🔥</div>
                <div class="avatar-option" data-avatar="🛡️">🛡️</div>
                <div class="avatar-option" data-avatar="🌟">🌟</div>
                <div class="avatar-option" data-avatar="💥">💥</div>
                <div class="avatar-option" data-avatar="🌪️">🌪️</div>
              </div>

              <div class="compact-auth-actions" style="margin-top:12px;">
                <button id="registerBtn" type="button">Create Account</button>
                <button id="hideRegisterBtn" class="secondary" type="button">Close</button>
              </div>
            </div>
          </div>

          <div id="loggedInPanel" class="hidden">
            <div class="profile-mini">
              <div class="profile-mini-avatar" id="miniAvatar">🦸</div>
              <div>
                <p style="margin:0; font-weight:700;" id="miniUsername">User</p>
                <p style="margin:4px 0 0; color:#cbd5e1; font-size:0.92rem;">Logged in</p>
              </div>
            </div>

            <div class="compact-auth-actions" style="margin-top:14px;">
              <a href="./profile.html" class="secondary button-link">Profile</a>
              <a href="./stats.html" class="secondary button-link">Stats</a>
              <a href="./settings.html" class="secondary button-link">Settings</a>
              <button id="logoutBtn" class="secondary" type="button">Logout</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="messageBox" class="message-box"></div>

    <section class="home-hero">
      <h1 class="title">DAMON</h1>
      <p class="subtitle">Battle of Knowledge</p>
    </section>

    <div class="grid-3 home-main-grid">
      <a href="./leaderboard.html" class="card hero-button">
        <h3>Leaderboard</h3>
        <p>Top players worldwide</p>
      </a>

      <button class="card hero-button" id="pvpBtn" type="button">
        <h3>Player vs Player</h3>
        <p>Challenge real opponents</p>
      </button>

      <button class="card hero-button" id="pcBtn" type="button">
        <h3>Game Lobby</h3>
        <p>Play against AI</p>
      </button>
    </div>

    <section class="card" style="margin-top:20px; text-align:center;">
      <div class="top-bar-actions" style="justify-content:center;">
        <a href="./settings.html" class="button-link">Open Settings</a>
        <a href="./stats.html" class="button-link">Open Stats</a>
      </div>
    </section>

  </div>

  <script src="./js/app-state.js"></script>
  <script src="./js/global-ui.js"></script>
  <script src="./js/theme.js"></script>
  <script src="./js/audio.js"></script>
  <script src="./js/home.js"></script>
</body>
</html>
