<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAMON - Home</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <div>
        <h1 class="title" style="text-align:left; margin:0;">DAMON</h1>
        <p class="subtitle" style="text-align:left; margin:6px 0 0;">Modern multiplayer quiz battles</p>
      </div>

      <section class="card compact-auth-card" id="sessionCard">
        <div id="loggedOutView">
          <h3 style="margin-top:0;">Quick Access</h3>

          <label for="loginUsername">Username</label>
          <input id="loginUsername" type="text" placeholder="Enter username">

          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="Enter password">

          <div class="compact-auth-actions">
            <button id="loginBtn" type="button">Login</button>
            <button id="toggleRegisterBtn" class="secondary" type="button">Register</button>
          </div>
        </div>

        <div id="loggedInView" class="hidden">
          <div class="profile-mini">
            <div class="profile-mini-avatar" id="miniAvatar">🦸</div>
            <div>
              <p style="margin:0; font-weight:700;" id="miniUsername">User</p>
              <p style="margin:4px 0 0; color:#cbd5e1; font-size:0.92rem;">Logged in</p>
            </div>
          </div>

          <div class="compact-auth-actions" style="margin-top:14px;">
            <button id="logoutBtn" class="secondary" type="button">Logout</button>
          </div>
        </div>
      </section>
    </div>

    <div id="messageBox" class="message-box"></div>

    <section class="card hidden" id="registerCard" style="max-width:700px; margin:0 auto 24px;">
      <h2>Register</h2>

      <div class="grid-2">
        <div>
          <label for="registerUsername">Username</label>
          <input id="registerUsername" type="text" placeholder="Enter username">
        </div>
        <div>
          <label for="registerPassword">Password</label>
          <input id="registerPassword" type="password" placeholder="Enter password">
        </div>
      </div>

      <h3>Choose Avatar</h3>
      <div class="avatar-grid" id="avatarGrid">
        <div class="avatar-option" data-avatar="🦸">🦸</div>
        <div class="avatar-option" data-avatar="🦹">🦹</div>
        <div class="avatar-option" data-avatar="⚡">⚡</div>
        <div class="avatar-option" data-avatar="🔥">🔥</div>
        <div class="avatar-option" data-avatar="🛡️">🛡️</div>
        <div class="avatar-option" data-avatar="🌟">🌟</div>
        <div class="avatar-option" data-avatar="💥">💥</div>
        <div class="avatar-option" data-avatar="🌪️">🌪️</div>
      </div>

      <div class="compact-auth-actions" style="margin-top:16px;">
        <button id="registerBtn" type="button">Create Account</button>
        <button id="closeRegisterBtn" class="secondary" type="button">Close</button>
      </div>
    </section>

    <section class="grid-3">
      <a class="card hero-button" href="leaderboard.html">
        <h3>Leaderboard</h3>
        <p>See top players and stats</p>
      </a>

      <button class="card hero-button" id="pcBtn" type="button">
        <h3>Game Lobby</h3>
        <p>Player vs PC</p>
      </button>

      <button class="card hero-button" id="pvpBtn" type="button">
        <h3>PVP</h3>
        <p>Multiplayer same-screen</p>
      </button>
    </section>
  </div>

  <script src="./js/app-state.js"></script>
  <script src="./js/home.js"></script>
</body>
</html>
