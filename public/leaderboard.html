<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAMON - Leaderboard</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <div>
        <h1 style="margin:0;">Leaderboard</h1>
        <p class="subtitle" style="text-align:left; margin:6px 0 0;">Top players, your match history, and head-to-head records</p>
      </div>
      <a class="card" href="home.html">Back Home</a>
    </div>

    <section class="card" style="margin-bottom:20px;">
      <h2>Player Rankings</h2>
      <div id="leaderboardList" class="leaderboard-list"></div>
    </section>

    <section class="card" style="margin-bottom:20px;">
      <h2>Your Match History</h2>
      <div id="historyList" class="history-list"></div>
    </section>

    <section class="card">
      <h2>Head-to-Head Records</h2>
      <div id="h2hList" class="h2h-list"></div>
    </section>
  </div>

  <script src="./js/app-state.js"></script>
  <script src="./js/leaderboard.js"></script>
</body>
</html>
