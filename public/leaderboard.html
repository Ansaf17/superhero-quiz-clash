<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAMON - Leaderboard</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <div>
        <h1 style="margin:0;">Leaderboard</h1>
        <p class="subtitle" style="text-align:left; margin:6px 0 0;">Top players, progress, and match history</p>
      </div>
      <a class="card" href="./home.html">Back Home</a>
    </div>

    <section class="card" style="margin-bottom:20px;">
      <div class="leaderboard-toolbar">
        <h2 style="margin:0;">Player Rankings</h2>

        <div class="leaderboard-filters">
          <select id="leaderboardSort">
            <option value="wins">Sort by Wins</option>
            <option value="points">Sort by Points</option>
            <option value="xp">Sort by XP</option>
            <option value="level">Sort by Level</option>
            <option value="matches">Sort by Matches Played</option>
          </select>
        </div>
      </div>

      <div id="leaderboardList" class="leaderboard-list"></div>
    </section>

    <section class="card" style="margin-bottom:20px;">
      <div class="leaderboard-toolbar">
        <h2 style="margin:0;">Your Match History</h2>

        <div class="leaderboard-filters">
          <select id="historyCategoryFilter">
            <option value="all">All Categories</option>
            <option value="math">Maths</option>
            <option value="banana">Banana API</option>
            <option value="general">General Knowledge</option>
            <option value="programming">Programming</option>
          </select>

          <select id="historyModeFilter">
            <option value="all">All Modes</option>
            <option value="pvp">PVP</option>
            <option value="pc">Player vs PC</option>
          </select>
        </div>
      </div>

      <div id="historyList" class="history-list"></div>
    </section>

    <section class="card">
      <h2>Head-to-Head Records</h2>
      <div id="h2hList" class="h2h-list"></div>
    </section>
  </div>

  <script src="./js/app-state.js"></script>
  <script src="./js/global-ui.js"></script>
  <script src="./js/theme.js"></script>
  <script src="./js/audio.js"></script>
  <script src="./js/leaderboard.js"></script>
</body>
</html>
